<!DOCTYPE html>
<html>
<head>
    <title>Music Recommender</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #121212;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
        }

        /* Heading */
        h2 {
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Section titles */
        h5 {
            font-weight: 500;
            margin-bottom: 10px;
        }

        /* Song titles */
        h6 {
            font-weight: 400;
            font-size: 14px;
            line-height: 1.4;
        }

        /* Cards */
        .card {
            background: #1e1e1e;
            border-radius: 14px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
        }

        /* Buttons */
        .btn {
            border-radius: 25px;
            font-size: 14px;
            padding: 6px 14px;
        }

        /* Mood buttons */
        .btn-success { background-color: #1db954; border: none; }
        .btn-warning { color: black; }

        /* Play button */
        .btn-danger {
            background-color: #ff3b3b;
            border: none;
        }

        /* Language buttons */
        .btn-outline-light {
            border-radius: 20px;
        }

        /* Active selection */
        .active-btn {
            border: 2px solid #1db954 !important;
        }
    </style>
</head>

<body>

<div class="container py-4">

    <h2 class="text-center mb-4">Mood Music Recommender</h2>

    <form method="POST" class="text-center">

        <!-- Hidden Inputs -->
        <input type="hidden" name="mood" id="moodInput">
        <input type="hidden" name="language" id="langInput">

        <!-- Mood -->
        <h5>Select Mood</h5>
        <div>
            <button type="button" onclick="setMood(this, 'happy')" class="btn btn-success btn-custom">😊 Happy</button>
            <button type="button" onclick="setMood(this, 'sad')" class="btn btn-primary btn-custom">😢 Sad</button>
            <button type="button" onclick="setMood(this, 'chill')" class="btn btn-info btn-custom">😌 Chill</button>
            <button type="button" onclick="setMood(this, 'energetic')" class="btn btn-warning btn-custom">⚡ Energetic</button>
        </div>

        <!-- Language -->
        <h5 class="mt-3">Select Language</h5>
        <div>
            <button type="button" onclick="setLang(this, 'Hindi')" class="btn btn-outline-light btn-custom">🇮🇳 Hindi</button>
            <button type="button" onclick="setLang(this, 'English')" class="btn btn-outline-light btn-custom">🇺🇸 English</button>
            <button type="button" onclick="setLang(this, 'Gujarati')" class="btn btn-outline-light btn-custom">🇮🇳 Gujarati</button>
            <button type="button" onclick="setLang(this, 'Telugu')" class="btn btn-outline-light btn-custom">🇮🇳 Telugu</button>
        </div>

        <br>
        <button type="submit" class="btn btn-danger">🎵 Get Songs</button>

    </form>

    <hr class="my-4">

    <!-- Songs -->
    <div class="row">
        {% for song in songs %}
        <div class="col-md-4 mb-4">
            <div class="card p-3 text-center">

                <img src="{{ song.thumbnail }}" class="img-fluid rounded mb-2">

                <h6>{{ song.title }}</h6>

                <a href="{{ song.link }}" target="_blank" class="btn btn-danger mt-2">
                    <i class="bi bi-play-fill"></i> Play
                </a>

            </div>
        </div>
        {% endfor %}
    </div>

</div>

<script>
    function setMood(btn, mood) {
        document.getElementById("moodInput").value = mood;

        document.querySelectorAll("button").forEach(b => b.classList.remove("active-btn"));
        btn.classList.add("active-btn");
    }

    function setLang(btn, lang) {
        document.getElementById("langInput").value = lang;

        document.querySelectorAll("button").forEach(b => b.classList.remove("active-btn"));
        btn.classList.add("active-btn");
    }
</script>

</body>
</html>
